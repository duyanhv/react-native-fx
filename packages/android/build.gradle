apply plugin: 'com.android.library'
apply plugin: 'expo-module-gradle-plugin'

group = 'expo.modules.reactnativefx'
version = '0.1.0'

// The expo-module-gradle-plugin supplies the Kotlin, compileSdk, and React
// Native wiring; this module declares Compose and the minSdk floor.
// Curated .agsl assets ship under src/main/assets/shaders and are compiled at
// runtime by RuntimeShader.
android {
  namespace 'expo.modules.reactnativefx'
  defaultConfig {
    minSdkVersion 24
    versionCode 1
    versionName '0.1.0'
  }
  buildFeatures {
    compose = true
  }
  composeOptions {
    kotlinCompilerExtensionVersion = "1.5.15"
  }
}

dependencies {
  def composeBom = platform('androidx.compose:compose-bom:2024.12.01')
  implementation composeBom
  implementation 'androidx.compose.ui:ui'
  implementation 'androidx.compose.foundation:foundation'
}
