buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20"
  }
}

apply plugin: 'com.android.library'
apply plugin: 'expo-module-gradle-plugin'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

group = 'expo.modules.reactnativefx'
version = '0.1.0'

// The expo-module-gradle-plugin supplies Kotlin, compileSdk, and React Native
// wiring. Compose is enabled here because FxHostedView embeds ComposeView.
// Curated .agsl assets ship under src/main/assets/shaders.
android {
  namespace 'expo.modules.reactnativefx'
  defaultConfig {
    minSdkVersion 24
    versionCode 1
    versionName '0.1.0'
  }
  buildFeatures {
    compose = true
  }
}

dependencies {
  def composeBom = platform('androidx.compose:compose-bom:2024.12.01')
  implementation composeBom
  implementation 'androidx.compose.ui:ui'
  implementation 'androidx.compose.foundation:foundation'
}
