name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - name: Type-check
        run: bunx tsc --noEmit
        working-directory: packages
      - run: bun run build
      - run: bun run lint
      - run: bun run test

  swift:
    name: Swift format
    # swift-format ships with Xcode and is invoked through xcrun, so this peer runs on macOS.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run swift:lint
        working-directory: packages

  # The SHIP-003 install-path proof: build the bare RN + Fabric fixture so a real
  # consumer's autolinking + native build keeps working on the pinned toolchain.
  bare-ios:
    name: Bare example · iOS build
    # RN 0.85's Swift packages require Swift 6.2 (Xcode 26); macos-latest still ships
    # Xcode 16.x / Swift 6.1, so pin the Xcode-26 runner.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build the library
        run: bun install --frozen-lockfile && bun run build
      - name: Install fixture dependencies
        run: bun install --frozen-lockfile
        working-directory: example-bare
      - name: Download the Metal toolchain
        # Xcode 26+ ships the Metal compiler as a separate component; fx bundles .metal
        # shaders. Harmless where the toolchain is already present.
        run: xcodebuild -downloadComponent MetalToolchain
        continue-on-error: true
      - name: Install Pods
        run: pod install
        working-directory: example-bare/ios
      - name: Assert react-native-fx autolinked (iOS)
        run: grep -q "ReactNativeFx" Podfile.lock
        working-directory: example-bare/ios
      - name: Build app (Debug, simulator)
        run: >
          xcodebuild
          -workspace FxBareExample.xcworkspace
          -scheme FxBareExample
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          -quiet
          build
        working-directory: example-bare/ios

  # Simulator smoke lane: mount every curated shader id on the hosted catalog screen,
  # switch between them, and assert the rendered surface is non-blank. This catches the
  # U3-006 blank-on-switch regression class without device sessions. A Release build embeds
  # the JS bundle so CI does not need a running Metro packager.
  ios-smoke:
    name: Shader catalog · iOS simulator smoke
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build the library
        run: bun install --frozen-lockfile && bun run build
      - name: Install example dependencies
        run: bun install --frozen-lockfile
        working-directory: example
      - name: Install the simulator driver
        run: bun install -g agent-device@0.17.1
      - name: Download the Metal toolchain
        # Xcode 26+ ships the Metal compiler as a separate component; fx bundles .metal
        # shaders. Harmless where the toolchain is already present.
        run: xcodebuild -downloadComponent MetalToolchain
        continue-on-error: true
      - name: Install Pods
        run: pod install
        working-directory: example/ios
      - name: Build example app (Release, simulator)
        run: >
          xcodebuild
          -workspace reactnativefxexample.xcworkspace
          -scheme reactnativefxexample
          -configuration Release
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath ../ios/build
          CODE_SIGNING_ALLOWED=NO
          -quiet
          build
        working-directory: example/ios
      - name: Run shader-catalog smoke harness
        run: bun run smoke:ios
        working-directory: example
        env:
          SMOKE_DEVICE: iPhone 17 Pro
          SMOKE_SCREEN_SCALE: 3

  # Android verifies the install-path autolinking here. The native assembleDebug compile
  # is intentionally NOT run yet: the Android library (packages/android) is still a build
  # scaffold and does not configure (missing versionName / publishable release component),
  # so a compile belongs with the Android-library build-readiness work, not this task. iOS
  # provides the mandatory native compile (bare-ios).
  # NOTE: Android smoke lane is deferred, not dropped. The Android lib is still a build
  # scaffold (same reason the native compile is skipped above); it belongs with the
  # Android-library build-readiness work.
  bare-android:
    name: Bare example · Android autolink
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build the library
        run: bun install --frozen-lockfile && bun run build
      - name: Install fixture dependencies
        run: bun install --frozen-lockfile
        working-directory: example-bare
      - name: Assert react-native-fx autolinked (Android)
        # The in-tree Expo autolinker must resolve fx for android with its concrete module
        # class, or the module never reaches the build. Assert both the package identifier
        # and the registered module class, not just discovery.
        run: |
          resolved=$(node -e "require(require.resolve('expo-modules-autolinking', { paths: [require.resolve('expo/package.json')] }))(['resolve', '--platform', 'android', '--json'])")
          echo "$resolved" | grep -q '"react-native-fx"'
          echo "$resolved" | grep -q 'expo.modules.reactnativefx.FxModule'
        working-directory: example-bare
